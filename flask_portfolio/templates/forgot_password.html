<!DOCTYPE html>
<html lang="en" data-theme="purple">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Asif Raza Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-bg-effects">
      <div class="auth-blob blob-1"></div>
      <div class="auth-blob blob-2"></div>
      <div class="auth-blob blob-3"></div>
    </div>

    <div class="auth-card glass-card" id="forgot-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">
          <span class="gradient-text">Asif Raza</span>
        </a>

        {% if is_reset and reset_token %}
        <!-- RESET PASSWORD MODE -->
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-subtitle">Enter your new password below</p>
      </div>

      <form class="auth-form" id="reset-form" novalidate>
        <input type="hidden" id="reset-token" value="{{ reset_token }}" />

        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="new-password" placeholder="New Password" class="auth-input" required />
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="confirm-password" placeholder="Confirm New Password" class="auth-input" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block auth-submit" id="reset-btn">
          <i class="fas fa-key"></i> Reset Password
        </button>

        <div id="reset-feedback" class="auth-feedback"></div>
      </form>

        {% else %}
        <!-- FORGOT PASSWORD MODE (email entry) -->
        <div class="auth-icon-circle">
          <i class="fas fa-unlock-alt"></i>
        </div>
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">No worries! Enter your email and we'll send you a reset link.</p>
      </div>

      <form class="auth-form" id="forgot-form" novalidate>
        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="forgot-email" name="email" placeholder="Your Email Address" class="auth-input" required />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block auth-submit" id="forgot-btn">
          <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>

        <div id="forgot-feedback" class="auth-feedback"></div>
      </form>
        {% endif %}

      <div class="auth-footer">
        <p>Remember your password? <a href="/login" class="auth-link">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    {% if is_reset and reset_token %}
    initResetForm();
    {% else %}
    initForgotForm();
    {% endif %}
  </script>
</body>
</html>

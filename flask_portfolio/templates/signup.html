<!DOCTYPE html>
<html lang="en" data-theme="purple">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Asif Raza Portfolio</title>
  <meta name="description" content="Create an account on Asif Raza Portfolio" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-bg-effects">
      <div class="auth-blob blob-1"></div>
      <div class="auth-blob blob-2"></div>
      <div class="auth-blob blob-3"></div>
    </div>

    <div class="auth-card glass-card" id="signup-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">
          <span class="gradient-text">Asif Raza</span>
        </a>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join to access exclusive features</p>
      </div>

      <form class="auth-form" id="signup-form" novalidate>
        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="signup-name" name="name" placeholder="Full Name" class="auth-input" required autocomplete="name" />
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="signup-email" name="email" placeholder="Email Address" class="auth-input" required autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signup-password" name="password" placeholder="Password (min 6 characters)" class="auth-input" required autocomplete="new-password" />
            <button type="button" class="toggle-password" id="toggle-pwd" aria-label="Show password">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="password-strength" id="pwd-strength">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <small class="pwd-hint" id="pwd-hint"></small>
        </div>

        <div class="form-group">
          <div class="input-icon-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signup-confirm" name="confirm_password" placeholder="Confirm Password" class="auth-input" required autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block auth-submit" id="signup-btn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>

        <div id="signup-feedback" class="auth-feedback"></div>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="/login" class="auth-link">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>initSignupForm();</script>
</body>
</html>

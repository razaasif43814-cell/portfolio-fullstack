<!DOCTYPE html>
<html lang="en" data-theme="purple">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogs — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="sidebar-header"><a href="/" class="sidebar-logo"><span class="gradient-text">AR</span><span class="logo-text">Admin</span></a><button class="sidebar-close" id="sidebar-close"><i class="fas fa-times"></i></button></div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="sidebar-link"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a>
        <a href="/admin/users" class="sidebar-link"><i class="fas fa-users"></i><span>Users</span></a>
        <a href="/admin/projects" class="sidebar-link"><i class="fas fa-project-diagram"></i><span>Projects</span></a>
        <a href="/admin/messages" class="sidebar-link"><i class="fas fa-envelope"></i><span>Messages</span></a>
        <a href="/admin/blogs" class="sidebar-link active"><i class="fas fa-blog"></i><span>Blogs</span></a>
        <div class="sidebar-divider"></div>
        <a href="/" class="sidebar-link"><i class="fas fa-globe"></i><span>View Site</span></a>
      </nav>
      <div class="sidebar-footer"><button class="sidebar-logout" id="logout-btn"><i class="fas fa-sign-out-alt"></i></button></div>
    </aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <button class="topbar-menu-btn" id="sidebar-toggle"><i class="fas fa-bars"></i></button>
        <h1 class="topbar-title">Blog Management</h1>
        <button class="btn btn-primary btn-sm" id="add-blog-btn"><i class="fas fa-plus"></i> New Post</button>
      </header>
      <div class="admin-content">
        <div class="modal-overlay" id="blog-modal" style="display:none">
          <div class="modal-card glass-card">
            <div class="modal-header"><h3 id="blog-modal-title">New Blog Post</h3><button class="modal-close" id="blog-modal-close"><i class="fas fa-times"></i></button></div>
            <form id="blog-form" class="modal-form">
              <input type="hidden" id="blog-id" />
              <div class="form-group"><label>Title</label><input type="text" id="blog-title" class="auth-input" required /></div>
              <div class="form-group"><label>Slug</label><input type="text" id="blog-slug" class="auth-input" placeholder="auto-generated" /></div>
              <div class="form-group"><label>Content</label><textarea id="blog-content" class="auth-input" rows="6" required></textarea></div>
              <div class="form-group"><label>Excerpt</label><input type="text" id="blog-excerpt" class="auth-input" /></div>
              <div class="form-row-2">
                <div class="form-group"><label>Category</label><input type="text" id="blog-category" class="auth-input" value="General" /></div>
                <div class="form-group"><label>Status</label><select id="blog-status" class="auth-input"><option value="draft">Draft</option><option value="published">Published</option></select></div>
              </div>
              <div class="form-group"><label>Tags (comma separated)</label><input type="text" id="blog-tags" class="auth-input" /></div>
              <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-save"></i> Save</button>
              <div id="blog-feedback" class="auth-feedback"></div>
            </form>
          </div>
        </div>
        <div class="data-table glass-card">
          <div class="table-header"><h3><i class="fas fa-blog"></i> All Posts</h3><span class="table-count" id="blog-count"></span></div>
          <table><thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Views</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="blogs-body"><tr><td colspan="6" class="loading-cell"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr></tbody></table>
        </div>
      </div>
    </main>
  </div>
  <script src="/static/js/admin.js"></script>
  <script>initBlogsPage();</script>
</body>
</html>

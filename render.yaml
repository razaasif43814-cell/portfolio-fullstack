services:
  - type: web
    name: asif-raza-portfolio
    runtime: python
    region: singapore
    rootDir: flask_portfolio
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_DEBUG
        value: "False"
      - key: MONGO_DB_NAME
        value: portfolio
      # Set these manually in Render dashboard (secrets):
      # SECRET_KEY, JWT_SECRET, MONGO_URI
    healthCheckPath: /

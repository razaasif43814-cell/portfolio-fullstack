<!DOCTYPE html>
<html lang="en" data-theme="purple">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Chat — Asif Raza Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/auth.css" />
  <style>
    .chat-wrapper{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
    .chat-topbar{padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border-glass);background:var(--card-glass);backdrop-filter:blur(12px)}
    .chat-topbar h1{font-size:20px;font-weight:700;color:var(--text-1);flex:1}
    .chat-topbar a{color:var(--primary);text-decoration:none;font-size:14px}
    .online-count{font-size:12px;color:var(--text-2);background:rgba(76,175,80,.15);padding:4px 12px;border-radius:20px}
    .online-count i{color:#4caf50;margin-right:4px}
    .chat-container{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:20px}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:300px;max-height:calc(100vh - 240px)}
    .chat-msg{display:flex;gap:10px;max-width:75%;animation:msgIn .3s ease}
    .chat-msg.self{align-self:flex-end;flex-direction:row-reverse}
    .msg-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#cc00bb);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0}
    .msg-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;background:var(--card-glass);border:1px solid var(--border-glass);color:var(--text-1)}
    .chat-msg.self .msg-bubble{background:linear-gradient(135deg,rgba(133,76,230,.2),rgba(204,0,187,.15));border-color:rgba(133,76,230,.3)}
    .msg-meta{font-size:10px;color:var(--text-2);margin-top:4px}
    .typing-indicator{font-size:12px;color:var(--text-2);font-style:italic;padding:4px 16px;min-height:20px}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .chat-input-area{padding:16px;border-top:1px solid var(--border-glass);display:flex;gap:12px;background:var(--card-glass);backdrop-filter:blur(8px);border-radius:0 0 16px 16px}
    .chat-input{flex:1;padding:14px 18px;background:rgba(255,255,255,.04);border:1.5px solid var(--border-glass);border-radius:25px;font-size:14px;font-family:inherit;color:var(--text-1);outline:none;transition:border-color .2s}
    .chat-input:focus{border-color:var(--primary)}
    .chat-send{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#cc00bb);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s}
    .chat-send:hover{transform:scale(1.1)}
    .chat-name-prompt{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px;text-align:center}
    .chat-name-prompt h2{font-size:24px;font-weight:700;color:var(--text-1)}
    .chat-name-prompt p{color:var(--text-2);font-size:14px}
    .name-input-row{display:flex;gap:12px;width:100%;max-width:400px}
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-topbar">
      <a href="/"><i class="fas fa-arrow-left"></i> Back</a>
      <h1><i class="fas fa-comments"></i> Live Chat</h1>
      <span class="online-count" id="online-count"><i class="fas fa-circle"></i> 0 online</span>
    </div>

    <!-- Name Prompt -->
    <div class="chat-container" id="name-prompt">
      <div class="chat-name-prompt glass-card" style="margin-top:60px;padding:48px;border-radius:20px">
        <div class="auth-icon-circle"><i class="fas fa-headset"></i></div>
        <h2>Join the Chat</h2>
        <p>Enter your name to start chatting in real-time</p>
        <div class="name-input-row">
          <input type="text" id="chat-name" class="chat-input" placeholder="Your Name" maxlength="30" />
          <button class="chat-send" id="join-btn"><i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
    </div>

    <!-- Chat Room (hidden until joined) -->
    <div class="chat-container" id="chat-room" style="display:none">
      <div class="glass-card" style="flex:1;display:flex;flex-direction:column;border-radius:20px;overflow:hidden">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="typing-indicator" id="typing-indicator"></div>
        <div class="chat-input-area">
          <input type="text" id="msg-input" class="chat-input" placeholder="Type a message..." maxlength="1000" />
          <button class="chat-send" id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
  (function() {
    var socket = io();
    var myName = '';
    var typingTimeout;

    // Join
    document.getElementById('join-btn').onclick = joinChat;
    document.getElementById('chat-name').onkeydown = function(e) { if(e.key==='Enter') joinChat(); };

    function joinChat() {
      myName = document.getElementById('chat-name').value.trim();
      if (!myName) return;
      document.getElementById('name-prompt').style.display = 'none';
      document.getElementById('chat-room').style.display = 'flex';
      socket.emit('join', { room: 'general', name: myName });
      document.getElementById('msg-input').focus();
    }

    // Send message
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeydown = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      else { socket.emit('typing', { room: 'general', sender: myName }); clearTimeout(typingTimeout); typingTimeout = setTimeout(function(){ socket.emit('stop_typing',{room:'general',sender:myName}); }, 1000); }
    };

    function sendMessage() {
      var input = document.getElementById('msg-input');
      var msg = input.value.trim();
      if (!msg) return;
      socket.emit('send_message', { room: 'general', sender: myName, message: msg });
      input.value = '';
      socket.emit('stop_typing', { room: 'general', sender: myName });
    }

    // Receive messages
    socket.on('new_message', function(data) {
      appendMessage(data.sender, data.message, data.time, data.sender === myName);
    });

    socket.on('chat_history', function(data) {
      data.messages.forEach(function(m) { appendMessage(m.sender, m.message, m.time, m.sender === myName); });
    });

    function appendMessage(sender, message, time, isSelf) {
      var container = document.getElementById('chat-messages');
      var div = document.createElement('div');
      div.className = 'chat-msg' + (isSelf ? ' self' : '');
      var initial = (sender||'?')[0].toUpperCase();
      var t = time ? new Date(time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
      div.innerHTML = '<div class="msg-avatar">'+initial+'</div><div><div class="msg-bubble">'+escapeMsg(message)+'</div><div class="msg-meta">'+escapeMsg(sender)+' · '+t+'</div></div>';
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function escapeMsg(t) { var d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

    // Online count
    socket.on('user_online', function(data) { document.getElementById('online-count').innerHTML = '<i class="fas fa-circle"></i> '+data.count+' online'; });
    socket.on('user_offline', function() {});

    // Typing indicator
    socket.on('user_typing', function(data) { document.getElementById('typing-indicator').textContent = data.user + ' is typing...'; });
    socket.on('user_stopped_typing', function() { document.getElementById('typing-indicator').textContent = ''; });
  })();
  </script>
</body>
</html>
